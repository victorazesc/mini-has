services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/dev.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_dev_data:/mosquitto/data
      - mosquitto_dev_log:/mosquitto/log

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    environment:
      PORT: 8000
      MINI_HAS_DB: /app/data/mini-has.db
      MQTT_URL: mqtt://mqtt:1883
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
      - server_dev_data:/app/data
    depends_on:
      - mqtt

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    environment:
      SERVER_URL: http://server:8000
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_next:/app/.next
    depends_on:
      - server

volumes:
  server_node_modules:
  client_node_modules:
  client_next:
  server_dev_data:
  mosquitto_dev_data:
  mosquitto_dev_log:
