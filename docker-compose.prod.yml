services:
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/prod.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      PORT: 8000
      MINI_HAS_DB: /app/data/mini-has.db
      MQTT_URL: mqtt://mqtt:1883
    ports:
      - "8000:8000"
    volumes:
      - server_data:/app/data
    depends_on:
      - mqtt

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./client/.env
    environment:
      SERVER_URL: http://server:8000
      FLOOR_MODEL_UPLOAD_DIR: /app/uploads/floors
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - client_floor_models:/app/uploads/floors
    depends_on:
      - server

volumes:
  server_data:
  client_floor_models:
  mosquitto_data:
  mosquitto_log:
