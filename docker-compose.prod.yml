services:
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/prod.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8000
      MINI_HAS_DB: /app/data/mini-has.db
      MQTT_URL: mqtt://mqtt:1883
      SMARTTHINGS_CLIENT_ID: ${SMARTTHINGS_CLIENT_ID:-}
      SMARTTHINGS_CLIENT_SECRET: ${SMARTTHINGS_CLIENT_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      - server_data:/app/data
    depends_on:
      - mqtt

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVER_URL: http://server:8000
      NEXT_TELEMETRY_DISABLED: "1"
      SMARTTHINGS_CLIENT_ID: ${SMARTTHINGS_CLIENT_ID:-}
      SMARTTHINGS_CLIENT_SECRET: ${SMARTTHINGS_CLIENT_SECRET:-}
      SMARTTHINGS_REDIRECT_URI: ${SMARTTHINGS_REDIRECT_URI:-}
      SMARTTHINGS_PUBLIC_ORIGIN: ${SMARTTHINGS_PUBLIC_ORIGIN:-}
      SMARTTHINGS_SCOPES: ${SMARTTHINGS_SCOPES:-r:devices:* x:devices:*}
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  server_data:
  mosquitto_data:
  mosquitto_log:
